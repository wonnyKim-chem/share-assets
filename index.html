  <style>
    :root {
      --ink: #1f2937;
      --sub: #64748b;
      --line: rgba(148, 163, 184, 0.35);
      --card: rgba(255, 255, 255, 0.9);
    }

    * {
      box-sizing: border-box;
      font-family: "SUIT", "Pretendard", "Noto Sans KR", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--ink);
      background:
        radial-gradient(70vw 45vh at 15% 10%, #fef3c7 0%, rgba(254, 243, 199, 0) 65%),
        radial-gradient(75vw 45vh at 85% 85%, #dbeafe 0%, rgba(219, 234, 254, 0) 65%),
        linear-gradient(145deg, #f8fafc, #ecfeff);
      padding: 1rem;
    }

    main {
      width: min(30rem, 100%);
      text-align: center;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 1rem;
      padding: 1.25rem 1rem;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
    }

    h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 900;
      letter-spacing: -0.01em;
    }

    p {
      margin: 0.5rem 0 0;
      color: var(--sub);
      font-size: 0.95rem;
      line-height: 1.45;
    }

    a {
      color: #0369a1;
      font-weight: 700;
    }

    .dot {
      display: inline-block;
      width: 0.5rem;
      height: 0.5rem;
      margin-right: 0.35rem;
      border-radius: 999px;
      background: #22c55e;
      animation: pulse 1.1s ease-in-out infinite;
      vertical-align: middle;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.45; transform: scale(0.95); }
      50% { opacity: 1; transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <main>
    <h1>환영합니다</h1>
    <p><span class="dot" aria-hidden="true"></span>당신의 학습 페이지로 이동하겠습니다</p>
    <p><a href="https://script.google.com/macros/s/AKfycbxrYk0KlluXBEaAFD52dp_6Y9X0qBIQlWF-0FZBZzSwdXpdsvhQRqfnMswVMsgQOoblXQ/exec?share=voca2026">자동 이동이 안 되면 여기를 눌러주세요.</a></p>
  </main>
  <script>
    (function () {
      var appUrl = 'https://script.google.com/macros/s/AKfycbxrYk0KlluXBEaAFD52dp_6Y9X0qBIQlWF-0FZBZzSwdXpdsvhQRqfnMswVMsgQOoblXQ/exec?share=voca2026';
      window.location.replace(appUrl);
    })();
  </script>
</body>
</html>
